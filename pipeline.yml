trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# ✅ Authenticate to Azure Artifacts
- task: MavenAuthenticate@0
  inputs:
    artifactsFeeds: 'my-maven-feed'

# ✅ Build using custom settings.xml (IMPORTANT)
- task: Maven@4
  inputs:
    mavenPomFile: 'my-app/pom.xml'
    goals: 'clean compile'
    options: '-s settings.xml'

# ✅ Run application with SAME settings (IMPORTANT)
- script: |
    mvn -s settings.xml -f my-app/pom.xml exec:java -Dexec.mainClass="com.example.App"
  displayName: 'Run Application'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)