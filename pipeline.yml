trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- script: |
    echo "==== CHECK TOKEN ===="
    if [ -z "$SYSTEM_ACCESSTOKEN" ]; then
      echo "❌ TOKEN IS EMPTY"
    else
      echo "✅ TOKEN IS PRESENT"
    fi
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: 'Check Token'

- script: |
    echo "==== TEST AZURE FEED ACCESS ===="
    curl -I -u AzureDevOps:$SYSTEM_ACCESSTOKEN \
    https://pkgs.dev.azure.com/arunimanh/synk_test/_packaging/my-maven-feed/maven/v1
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: 'Test Feed Auth'

- script: |
    mvn -X --settings $(Build.SourcesDirectory)/settings.xml \
        -f my-app/pom.xml clean compile
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: 'Build (Debug Mode)'