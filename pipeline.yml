trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 🔥 Clean any hidden Maven configs
- script: |
    echo "Cleaning Maven environment..."
    rm -rf ~/.m2
  displayName: 'Reset Maven Environment'

# 🔐 Authenticate to Azure Artifacts
- task: MavenAuthenticate@0
  inputs:
    artifactsFeeds: 'my-maven-feed'

# 🔧 Build using custom settings.xml
- script: |
    mvn --settings $(Build.SourcesDirectory)/settings.xml \
        -f my-app/pom.xml \
        clean compile
  displayName: 'Build Project'

# ▶️ Run application
- script: |
    mvn --settings $(Build.SourcesDirectory)/settings.xml \
        -f my-app/pom.xml \
        exec:java -Dexec.mainClass="com.example.App"
  displayName: 'Run Application'
