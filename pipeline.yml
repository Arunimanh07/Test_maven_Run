trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- task: MavenAuthenticate@0
  inputs:
    artifactsFeeds: 'my-maven-feed'

# ✅ FIXED PATH HERE
- task: Maven@4
  inputs:
    mavenPomFile: 'my-app/pom.xml'
    goals: 'clean compile'

# ✅ ALSO FIXED HERE
- script: |
    mvn -f my-app/pom.xml exec:java -Dexec.mainClass="com.example.App"
  displayName: 'Run Application'
  