trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: MavenAuthenticate@0
  inputs:
    artifactsFeeds: 'my-maven-feed'

- task: Maven@4
  inputs:
    mavenPomFile: 'my-app/pom.xml'   # ✅ FIXED
    goals: 'clean compile'

- script: |
    mvn clean compile
    java -cp target/classes com.example.App
  displayName: 'Run Application'
