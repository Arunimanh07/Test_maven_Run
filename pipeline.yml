trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# ✅ REQUIRED for authentication
- task: MavenAuthenticate@0
  inputs:
    artifactsFeeds: 'my-maven-feed'

# ✅ Build
- task: Maven@4
  inputs:
    mavenPomFile: 'my-app/pom.xml'
    goals: 'clean compile'
    options: '-s $(Build.SourcesDirectory)/settings.xml'

# ✅ Debug (optional)
- script: |
    mvn -s $(Build.SourcesDirectory)/settings.xml help:effective-settings
  displayName: 'DEBUG SETTINGS'